name: tiketdotcom
description: "E-Ticketing Helpdesk Mobile Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # State Management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7
  # Dependency Injection
  get_it: ^8.0.3
  # Networking & BaaS
  dio: ^5.8.0
  supabase_flutter: ^2.8.1
  # Functional Programming helpers
  dartz: ^0.10.1
  # UI & Utils
  google_fonts: ^7.0.0
  shared_preferences: ^2.5.2
  intl: ^0.20.2
  # Media & Optimization
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
